<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrabble Solver</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1a1a2e;color:#eee;padding:16px;min-height:100vh}
h1{text-align:center;margin-bottom:16px;font-size:22px;color:#f5e642}
#app{max-width:1200px;margin:0 auto;display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}
#left-panel{flex:0 0 auto}
#right-panel{flex:1;min-width:280px}

#board{display:grid;grid-template-columns:repeat(15,1fr);gap:2px;width:510px}
.cell{width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;cursor:pointer;border-radius:2px;background:#c8b89a;color:#333;text-transform:uppercase;user-select:none;position:relative;transition:outline 0.05s}
.cell.tw{background:#c0392b;color:#fff}
.cell.dw{background:#e67e22;color:#fff}
.cell.tl{background:#2471a3;color:#fff}
.cell.dl{background:#5dade2;color:#333}
.cell.filled{background:#f5e642!important;color:#222!important;font-size:15px!important;border:1px solid #bbb}
.cell.selected{outline:3px solid #00ff88;z-index:2}
.cell.new-tile{background:#a8d8a8!important;color:#222!important;font-size:15px!important;border:1px solid #6a6}
.lv{position:absolute;bottom:1px;right:2px;font-size:6px;opacity:.7}

#controls{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
label{font-size:12px;color:#aaa;min-width:70px}
input[type=text]{background:#2d2d44;border:1px solid #555;color:#fff;padding:6px 10px;border-radius:4px;font-size:16px;text-transform:uppercase;letter-spacing:2px;width:180px}
input[type=file]{color:#aaa;font-size:12px}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:13px}
#solve-btn{background:#00b4d8;color:#fff;font-size:14px;padding:10px 20px}
#solve-btn:disabled{background:#444;cursor:not-allowed}
#solve-btn:hover:not(:disabled){background:#0096c7}
.btn-sm{background:#333;color:#ccc}
.btn-sm:hover{background:#444}
#wl-status{font-size:11px;color:#777;margin-top:2px}
#dir-indicator{font-size:12px;color:#00ff88;font-weight:bold}
#solving{display:none;color:#00ff88;font-style:italic;font-size:13px}

#rack-display{display:flex;gap:4px;margin-top:4px}
.rt{width:34px;height:34px;background:#f5e642;color:#222;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;border-radius:4px;border:2px solid #ccc;position:relative}
.rt.blank{background:#ddd;color:#888;font-size:12px}
.rt .rv{position:absolute;bottom:1px;right:2px;font-size:7px;color:#666}

#results-hdr{font-weight:bold;margin-bottom:8px;font-size:15px}
#results{max-height:620px;overflow-y:auto}
.ri{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#2d2d44;border-radius:4px;margin-bottom:5px;cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.ri:hover{background:#3a3a55}
.ri.active{background:#1a3a2a;border-left-color:#00ff88}
.rw{font-size:18px;font-weight:bold;color:#f5e642;letter-spacing:2px}
.rp{font-size:11px;color:#888;margin-top:2px}
.rs{font-size:20px;font-weight:bold;color:#00b4d8;margin-left:auto}
.rb{font-size:10px;color:#f39c12;margin-left:4px}

#hint{font-size:11px;color:#555;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<h1>Scrabble Solver</h1>
<div id="app">
  <div id="left-panel">
    <div id="board"></div>
    <div id="controls">
      <div class="row">
        <label>Rack:</label>
        <input type="text" id="rack" maxlength="7" placeholder="AEILNRT" autocomplete="off" autocorrect="off" spellcheck="false">
        <span id="dir-indicator">→ H</span>
      </div>
      <div id="rack-display"></div>
      <div class="row">
        <button class="btn" id="solve-btn" onclick="solve()">Find Best Moves</button>
        <button class="btn btn-sm" onclick="clearBoard()">Clear Board</button>
        <button class="btn btn-sm" onclick="clearHL()">Clear Highlight</button>
      </div>
      <div class="row">
        <label>Dictionary:</label>
        <input type="file" id="wf" accept=".txt" onchange="loadFile(this)">
      </div>
      <div id="wl-status">Built-in: 0 words loading…</div>
      <div id="solving">Solving…</div>
      <div id="hint">Click a cell then type to place tiles on the board.<br>Arrow keys move cursor · Backspace clears · Tab toggles H/V direction.</div>
    </div>
  </div>
  <div id="right-panel">
    <div id="results-hdr">Best Moves</div>
    <div id="results"><div style="color:#555;font-size:13px">Enter rack tiles and press Find Best Moves</div></div>
  </div>
</div>
<script>
const BS=15,CEN=7;

const BM=(()=>{
  const m={};
  [[0,0],[0,7],[0,14],[7,0],[7,14],[14,0],[14,7],[14,14]].forEach(([r,c])=>m[r*15+c]='TW');
  [[1,1],[2,2],[3,3],[4,4],[10,10],[11,11],[12,12],[13,13],
   [1,13],[2,12],[3,11],[4,10],[10,4],[11,3],[12,2],[13,1],[7,7]].forEach(([r,c])=>m[r*15+c]='DW');
  [[1,5],[1,9],[5,1],[5,5],[5,9],[5,13],[9,1],[9,5],[9,9],[9,13],[13,5],[13,9]].forEach(([r,c])=>m[r*15+c]='TL');
  [[0,3],[0,11],[2,6],[2,8],[3,0],[3,7],[3,14],[6,2],[6,6],[6,8],[6,12],
   [7,3],[7,11],[8,2],[8,6],[8,8],[8,12],[11,0],[11,7],[11,14],[12,6],[12,8],[14,3],[14,11]].forEach(([r,c])=>m[r*15+c]='DL');
  return m;
})();

const LV={A:1,B:3,C:3,D:2,E:1,F:4,G:2,H:4,I:1,J:8,K:5,L:1,M:3,N:1,O:1,P:3,Q:10,R:1,S:1,T:1,U:1,V:4,W:4,X:8,Y:4,Z:10};
const BL={TW:'tw',DW:'dw',TL:'tl',DL:'dl'};
const BN={TW:'3W',DW:'2W',TL:'3L',DL:'2L'};

let board=Array(BS).fill(null).map(()=>Array(BS).fill(null));
let wByLen={};
let sel=null,inputDir='H';
let lastResults=[];

function setWordList(words){
  const clean=words.map(w=>w.toUpperCase()).filter(w=>/^[A-Z]{2,15}$/.test(w));
  wByLen={};
  for(const w of clean){
    if(!wByLen[w.length])wByLen[w.length]=new Set();
    wByLen[w.length].add(w);
  }
  return clean.length;
}

function loadBuiltin(){
  const n=setWordList(BUILTIN.split(/\s+/).filter(Boolean));
  document.getElementById('wl-status').textContent=`Built-in: ${n} words. Upload a .txt dictionary for full results.`;
}

function loadFile(inp){
  const f=inp.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    const n=setWordList(e.target.result.split(/\r?\n/).map(w=>w.trim()));
    document.getElementById('wl-status').textContent=`"${f.name}": ${n} words loaded.`;
  };
  r.readAsText(f);
}

// ── BOARD RENDER ───────────────────────────────────────────────────────────
function initBoard(){
  const el=document.getElementById('board');
  el.innerHTML='';
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
    const d=document.createElement('div');
    d.className='cell';
    d.id=`c${r}_${c}`;
    const b=BM[r*15+c];
    if(b)d.classList.add(BL[b]);
    d.addEventListener('click',()=>clickCell(r,c));
    el.appendChild(d);
  }
  renderBoard();
}

function renderBoard(hl=null){
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
    const d=document.getElementById(`c${r}_${c}`);
    d.className='cell';
    const b=BM[r*15+c];
    if(b)d.classList.add(BL[b]);
    const L=board[r][c];
    if(L){
      d.classList.add('filled');
      d.innerHTML=`${L}<span class="lv">${LV[L]||''}</span>`;
    } else {
      d.textContent=r===CEN&&c===CEN?'★':(b?BN[b]:'');
    }
    if(hl){
      for(let i=0;i<hl.word.length;i++){
        const hr=hl.dir==='H'?hl.row:hl.row+i;
        const hc=hl.dir==='H'?hl.col+i:hl.col;
        if(r===hr&&c===hc&&!board[r][c]){
          d.classList.add('new-tile');
          d.textContent=hl.word[i];
        }
      }
    }
    if(sel&&sel.r===r&&sel.c===c)d.classList.add('selected');
  }
}

// ── BOARD INPUT ────────────────────────────────────────────────────────────
function clickCell(r,c){
  if(sel&&sel.r===r&&sel.c===c){
    inputDir=inputDir==='H'?'V':'H';
    document.getElementById('dir-indicator').textContent=inputDir==='H'?'→ H':'↓ V';
  }
  sel={r,c};
  renderBoard();
}

document.addEventListener('keydown',e=>{
  if(!sel)return;
  const {r,c}=sel;
  if(e.key==='Escape'){sel=null;renderBoard();return;}
  if(e.key==='Tab'){
    e.preventDefault();
    inputDir=inputDir==='H'?'V':'H';
    document.getElementById('dir-indicator').textContent=inputDir==='H'?'→ H':'↓ V';
    renderBoard();return;
  }
  if(e.key==='Backspace'||e.key==='Delete'){
    if(board[r][c])board[r][c]=null;
    else{
      if(inputDir==='H'&&c>0)sel={r,c:c-1};
      else if(inputDir==='V'&&r>0)sel={r:r-1,c};
      if(board[sel.r][sel.c])board[sel.r][sel.c]=null;
    }
    renderBoard();return;
  }
  if(/^[a-zA-Z]$/.test(e.key)){
    board[r][c]=e.key.toUpperCase();
    if(inputDir==='H'&&c<BS-1)sel={r,c:c+1};
    else if(inputDir==='V'&&r<BS-1)sel={r:r+1,c};
    renderBoard();return;
  }
  const moves={ArrowRight:{r,c:Math.min(c+1,BS-1)},ArrowLeft:{r,c:Math.max(c-1,0)},ArrowDown:{r:Math.min(r+1,BS-1),c},ArrowUp:{r:Math.max(r-1,0),c}};
  if(moves[e.key]){sel=moves[e.key];e.preventDefault();renderBoard();}
});

document.getElementById('rack').addEventListener('input',function(){
  const d=document.getElementById('rack-display');
  d.innerHTML=this.value.toUpperCase().split('').map(ch=>`<div class="rt${ch==='?'?' blank':''}">${ch==='?'?'?':ch}${ch!=='?'&&LV[ch]?`<span class="rv">${LV[ch]}</span>`:''}</div>`).join('');
});

function clearBoard(){
  board=Array(BS).fill(null).map(()=>Array(BS).fill(null));
  document.getElementById('results').innerHTML='<div style="color:#555;font-size:13px">Board cleared.</div>';
  lastResults=[];renderBoard();
}
function clearHL(){document.querySelectorAll('.ri').forEach(e=>e.classList.remove('active'));renderBoard();}

// ── SOLVER ─────────────────────────────────────────────────────────────────
function isEmpty(){return board.every(row=>row.every(c=>c===null));}

function matchTpl(word,tpl){
  for(let i=0;i<tpl.length;i++)if(tpl[i]&&tpl[i]!==word[i])return false;
  return true;
}

function trySources(word,tpl,rack){
  const rc=[...rack],src=[];
  for(let i=0;i<word.length;i++){
    if(tpl[i]){src.push('B');continue;}
    const idx=rc.indexOf(word[i]);
    if(idx!==-1){src.push('R');rc.splice(idx,1);}
    else{const bi=rc.indexOf('?');if(bi!==-1){src.push('X');rc.splice(bi,1);}else return null;}
  }
  return src;
}

function crossWord(r,c,L,dir){
  if(dir==='H'){
    let t=r,b=r;
    while(t>0&&board[t-1][c])t--;
    while(b<BS-1&&board[b+1][c])b++;
    if(t===b)return null;
    let w='';for(let i=t;i<=b;i++)w+=i===r?L:board[i][c];return w;
  } else {
    let l=c,ri=c;
    while(l>0&&board[r][l-1])l--;
    while(ri<BS-1&&board[r][ri+1])ri++;
    if(l===ri)return null;
    let w='';for(let i=l;i<=ri;i++)w+=i===c?L:board[r][i];return w;
  }
}

function cwValid(cw){if(!cw||cw.length<2)return true;return wByLen[cw.length]&&wByLen[cw.length].has(cw);}

function scoreMove(word,row,col,dir,src){
  let main=0,wm=1,cross=0,used=0;
  for(let i=0;i<word.length;i++){
    const r=dir==='H'?row:row+i,c=dir==='H'?col+i:col;
    const lv=src[i]==='X'?0:(LV[word[i]]||0);
    const bn=src[i]!=='B'?BM[r*15+c]:null;
    if(src[i]!=='B'){
      used++;
      if(bn==='DL')main+=lv*2;
      else if(bn==='TL')main+=lv*3;
      else main+=lv;
      if(bn==='DW'||bn==='TW')wm*=bn==='TW'?3:2;
      // cross-word contribution
      const cw=crossWord(r,c,word[i],dir);
      if(cw){
        let cs=bn==='DL'?lv*2:bn==='TL'?lv*3:lv,cm=bn==='DW'?2:bn==='TW'?3:1;
        if(dir==='H'){let t=r-1,b=r+1;while(t>=0&&board[t][c]){cs+=LV[board[t][c]]||0;t--;}while(b<BS&&board[b][c]){cs+=LV[board[b][c]]||0;b++;}}
        else{let l=c-1,ri=c+1;while(l>=0&&board[r][l]){cs+=LV[board[r][l]]||0;l--;}while(ri<BS&&board[r][ri]){cs+=LV[board[r][ri]]||0;ri++;}}
        cross+=cs*cm;
      }
    } else {
      main+=lv;
    }
  }
  return main*wm+cross+(used===7?50:0);
}

function findDir(rack,dir,results){
  for(let line=0;line<BS;line++){
    const la=[];
    for(let p=0;p<BS;p++)la.push(dir==='H'?board[line][p]:board[p][line]);
    const anchors=new Set();
    const empty=isEmpty();
    if(empty){if((dir==='H'&&line===CEN)||(dir==='V'&&line===CEN))anchors.add(CEN);}
    else{
      for(let p=0;p<BS;p++){
        const r=dir==='H'?line:p,c=dir==='H'?p:line;
        if(la[p]!==null)anchors.add(p);
        else if((r>0&&board[r-1][c])||(r<BS-1&&board[r+1][c])||(c>0&&board[r][c-1])||(c<BS-1&&board[r][c+1]))anchors.add(p);
      }
    }
    if(!anchors.size)continue;
    for(let start=0;start<BS;start++){
      if(start>0&&la[start-1]!==null)continue;
      for(let len=2;len<=BS-start;len++){
        const end=start+len-1;
        if(end<BS-1&&la[end+1]!==null)continue;
        let hit=false;for(const a of anchors)if(a>=start&&a<=end){hit=true;break;}
        if(!hit)continue;
        const tpl=la.slice(start,start+len);
        const nc=tpl.filter(x=>x===null).length;
        if(!nc||nc>rack.length)continue;
        const cands=wByLen[len];if(!cands)continue;
        for(const word of cands){
          if(!matchTpl(word,tpl))continue;
          const src=trySources(word,tpl,rack);if(!src)continue;
          let ok=true;
          for(let i=0;i<len;i++){
            if(src[i]==='B')continue;
            const r=dir==='H'?line:start+i,c=dir==='H'?start+i:line;
            if(!cwValid(crossWord(r,c,word[i],dir))){ok=false;break;}
          }
          if(!ok)continue;
          const row=dir==='H'?line:start,col=dir==='H'?start:line;
          const score=scoreMove(word,row,col,dir,src);
          results.push({word,row,col,dir,score,src});
        }
      }
    }
  }
}

function solve(){
  const rackStr=document.getElementById('rack').value.toUpperCase().replace(/[^A-Z?]/g,'');
  if(!rackStr){alert('Enter your rack tiles first.');return;}
  if(!Object.keys(wByLen).length){alert('No word list loaded.');return;}
  const rack=rackStr.split('');
  const btn=document.getElementById('solve-btn');
  btn.disabled=true;
  document.getElementById('solving').style.display='block';
  setTimeout(()=>{
    const res=[];
    findDir(rack,'H',res);
    findDir(rack,'V',res);
    res.sort((a,b)=>b.score-a.score);
    const seen=new Set();
    const uniq=res.filter(r=>{const k=`${r.word}|${r.row}|${r.col}|${r.dir}`;if(seen.has(k))return false;seen.add(k);return true;});
    lastResults=uniq.slice(0,30);
    displayResults(lastResults);
    btn.disabled=false;
    document.getElementById('solving').style.display='none';
  },30);
}

function colLtr(c){return String.fromCharCode(65+c);}

function displayResults(res){
  const el=document.getElementById('results');
  if(!res.length){el.innerHTML='<div style="color:#888;font-size:13px">No valid moves found. Check your word list or board state.</div>';return;}
  el.innerHTML=res.map((r,i)=>{
    const pos=r.dir==='H'?`${r.row+1}${colLtr(r.col)} →`:`${colLtr(r.col)}${r.row+1} ↓`;
    const bingo=r.src.filter(s=>s!=='B').length===7?'<span class="rb">BINGO!</span>':'';
    return `<div class="ri" onclick="hlMove(${i})" data-i="${i}"><div><div class="rw">${r.word}${bingo}</div><div class="rp">${pos}</div></div><div class="rs">+${r.score}</div></div>`;
  }).join('');
}

function hlMove(i){
  document.querySelectorAll('.ri').forEach(e=>e.classList.remove('active'));
  document.querySelector(`.ri[data-i="${i}"]`)?.classList.add('active');
  renderBoard(lastResults[i]);
}

// ── INIT ───────────────────────────────────────────────────────────────────
loadBuiltin();
initBoard();
</script>
